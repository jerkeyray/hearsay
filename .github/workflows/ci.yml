name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      # hearsay's go.mod uses `replace github.com/jerkeyray/starling => ../starling`
      # during co-development, so CI checks both repos out as siblings.
      - name: checkout hearsay
        uses: actions/checkout@v4
        with:
          path: hearsay

      - name: checkout starling
        uses: actions/checkout@v4
        with:
          repository: jerkeyray/starling
          path: starling

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'

      - name: build
        working-directory: hearsay
        run: go build ./...

      - name: vet
        working-directory: hearsay
        run: go vet ./...

      - name: test
        working-directory: hearsay
        run: go test -race ./...
